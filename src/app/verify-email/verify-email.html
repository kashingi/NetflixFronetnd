<div class="auth-page">
    <div class="bg"></div>

    <div class="logo">
        <mat-icon class="logo-icon">movie</mat-icon>
        <span class="logo-text">Movie Show</span>
    </div>

    <mat-card class="auth-card" appearance="outlined">
        @if (loading) {
        <div class="loading-container">
            <mat-spinner diameter="60"></mat-spinner>
            <h3>Verifying your email...</h3>
        </div>
        }@else if (!loading && success) {
        <div class="success-container">
            <mat-icon class="success-icon">check_circle</mat-icon>
            <h2>Email verified</h2>
            <p class="message"> {{ message }} </p>
            <button mat-flat-button class="action-btn" routerLink="/login">
                Go to login
            </button>
        </div>
        }@else if (!loading && !success) {
        <div class="error-container">
            <mat-icon class="success-icon">error_outline</mat-icon>
            <h2>Verification failed</h2>
            <p class="message"> {{ message }} </p>
            <div class="actions">
                <button mat-flat-button class="action-btn" routerLink="/login">
                    Go to login
                </button>
                <p class="resend-info">You can request a new verification email from the login page.</p>
            </div>
        </div>
        }


    </mat-card>
</div>
